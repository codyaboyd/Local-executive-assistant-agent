services:
  fastcrw:
    image: ghcr.io/us/crw:latest
    container_name: exec-agent-fastcrw
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FASTCRW_PORT:-3002}:3000"
    environment:
      FASTCRW_PORT: "${FASTCRW_PORT:-3002}"
      FASTCRW_API_KEY: "${FASTCRW_API_KEY:-}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || curl -fsS http://127.0.0.1:3000/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
